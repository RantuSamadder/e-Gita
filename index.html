<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Śrīmad Bhagavad Gītā</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:wght@400;500;600;700&family=Tiro+Devanagari+Sanskrit&family=Noto+Serif+Bengali:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
    <div class="loader-text">
        Śrīmad Bhagavad Gītā
    </div>
</div>

<div class="container">

    <section class="hero">
        <h1>Śrīmad Bhagavad Gītā</h1>
        <p>Hare Krishna Hare Krishna Krishna Krishna Hare Hare Hare Ram Hare Ram Ram Ram Hare Hare</p>
    </section>

    <section class="book-view" id="bookView">
        <div class="book-title">
            <h2>Index</h2>
        </div>
        <div class="index-list" id="indexContainer"></div>
    </section>

    <section class="chapter-view" id="chapterView">
        <div class="chapter-header" id="chapterHeader"></div>
        <div class="controls">
            <h3>Display Options</h3>
            <div class="checkbox-grid" id="checkboxContainer"></div>
        </div>
        <div id="versesContainer"></div>
    </section>

    <footer class="footer">
        <p>जय श्री कृष्ण</p>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
