<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শ্রীমদ্ভগবদ্গীতা যথাযথ | Bhagavad Gita As It Is</title>
    <meta name="description" content="Read Śrīmad Bhagavad Gītā online with Sanskrit, transliteration, Bengali and English translations along with audio recitation.">
    <meta name="keywords" content="Bhagavad Gita, Gita, Krishna, ISKCON, Sanskrit, Bengali Translation, English Translation, Bhagavad Gita Online">
    <meta name="author" content="Rantu Samadder">
    <meta name="theme-color" content="#b8860b">

    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="shortcut icon" href="assets/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:wght@400;500;600;700&family=Tiro+Devanagari+Sanskrit&family=Noto+Serif+Bengali:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader">
    <div class="loader-container">
        <div class="mandala-spinner">
            <div class="inner-ring"></div>
            <div class="outer-ring"></div>
            <div class="shimmer-core"></div>
        </div>
        <div class="loader-text" id="loaderText">শ্রীমদ্ভগবদ্গীতা যথাযথ</div>
    </div>
</div>

<div class="container">
    
    <div class="lang-switcher">
        <label for="langSelect" id="langLabel">ভাষা / Language:</label>
        <select id="langSelect" onchange="toggleLanguage()">
            <option value="bn">বাংলা (Bengali)</option>
            <option value="en">English</option>
        </select>
    </div>

    <section class="hero">
        <h1 id="heroTitle">শ্রীমদ্ভগবদ্গীতা যথাযথ</h1>
        <p id="heroSubtitle">
            হরে কৃষ্ণ হরে কৃষ্ণ কৃষ্ণ কৃষ্ণ হরে হরে <br>
            হরে রাম হরে রাম রাম রাম হরে হরে
        </p>
    </section>

    <section class="book-view" id="bookView">
        <div class="book-title">
            <h2 id="indexHeader">সূচীপত্র</h2>
        </div>
        <div class="jump-filter-container main-jump">
            <h3 id="jumpHeaderMain">সরাসরি শ্লোকে যান</h3>
            <div class="filter-controls">
                <select id="mainChapterSelect" onchange="populateVerses('main')">
                    <option value="">অধ্যায় নির্বাচন করুন</option>
                </select>
                <select id="mainVerseSelect" disabled>
                    <option value="">শ্লোক নির্বাচন করুন</option>
                </select>
                <button onclick="jumpToVerse('main')" class="jump-btn" id="btnGoMain">যান →</button>
            </div>
        </div>
        
        <div class="index-list" id="indexContainer"></div>
    </section>

    <section class="chapter-view" id="chapterView">
        <div class="chapter-header" id="chapterHeader"></div>

        <div class="jump-filter-container chapter-jump" id="chapJumpContainer">
            <div class="filter-controls">
                <select id="chapVerseSelect">
                    <option value="">শ্লোক নির্বাচন করুন</option>
                </select>
                <button onclick="jumpToVerse('chap')" class="jump-btn" id="btnGoChap">শ্লোকে যান</button>
            </div>
        </div>

        <div class="controls" id="checkboxControls">
            <div class="view-mode-tabs" id="viewModeTabs">
                <button type="button" class="view-mode-btn" data-mode="default" onclick="setViewMode('default')">সাধারণ</button>
                <button type="button" class="view-mode-btn" data-mode="advanced" onclick="setViewMode('advanced')">বিস্তারিত</button>
                <button type="button" class="view-mode-btn" data-mode="dual" onclick="setViewMode('dual')">দ্বৈত ভাষা</button>
            </div>
            <div class="checkbox-grid" id="checkboxContainer"></div>
        </div>

        <div id="versesContainer"></div>

        <div id="chapterNavigation" class="chapter-nav"></div>
    </section>

    <footer class="footer">
        <p>जय श्री कृष्ण</p>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
